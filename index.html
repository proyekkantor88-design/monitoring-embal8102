<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMBAL - BPS Maluku Tenggara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { 
            .no-print { display: none !important; } 
            #main-content { margin-left: 0 !important; width: 100% !important; }
            table { font-size: 8pt !important; width: 100% !important; border-collapse: collapse !important; border: 1px solid black !important; }
            th, td { border: 1px solid black !important; padding: 4px !important; }
            @page { size: landscape; margin: 0.5cm; }
        }
        #sidebar { transition: all 0.3s; width: 17rem; }
        #sidebar.hidden-sidebar { margin-left: -17rem; }
        .tab-content { transition: opacity 0.2s; }
        th { font-size: 9px !important; text-transform: uppercase; background-color: #f8fafc; border: 1px solid #e2e8f0; text-align: center; color: #64748b; font-weight: 800; }
        td { font-size: 10px !important; border: 1px solid #e2e8f0; padding: 8px; color: #1e293b; }
        .input-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); padding: 2rem; margin-bottom: 2rem; border-left: 8px solid #6366f1; }
        .input-field { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: border 0.2s; }
        .input-field:focus { border-color: #6366f1; }
        .btn-main { width: 100%; padding: 1rem; color: white; font-weight: 800; text-transform: uppercase; border-radius: 0.75rem; transition: all 0.2s; cursor: pointer; }
    </style>
</head>
<body class="bg-[#f8fafc] flex font-sans text-slate-900 overflow-x-hidden">

    <aside id="sidebar" class="h-screen bg-[#1e1b4b] text-white p-6 fixed top-0 left-0 no-print flex flex-col shadow-2xl z-50">
        <div class="mb-10 border-b border-white/10 pb-6">
            <div class="flex items-center gap-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/28/Lambang_Badan_Pusat_Statistik_%28BPS%29_Indonesia.svg" class="w-10 h-10">
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">EMBAL</h1>
            </div>
            <p class="text-[10px] text-orange-400 font-bold uppercase mt-2 tracking-widest">BPS Kab. Maluku Tenggara</p>
        </div>
        <nav class="flex-1 space-y-2 font-bold text-sm">
            <button onclick="switchTab('dashboard')" class="w-full text-left p-3 rounded-xl hover:bg-white/10 transition">Dashboard Utama</button>
            <button onclick="switchTab('setting-pagu')" class="w-full text-left p-3 rounded-xl hover:bg-white/10 text-orange-300">⚙️ Setting Pagu</button>
            <button onclick="switchTab('input-rpd')" class="w-full text-left p-3 rounded-xl hover:bg-white/10">Input RPD</button>
            <button onclick="switchTab('permintaan-belanja')" class="w-full text-left p-3 rounded-xl hover:bg-white/10">Permintaan Belanja</button>
            <button onclick="switchTab('realisasi-rpd')" class="w-full text-left p-3 rounded-xl hover:bg-white/10 text-emerald-400">Realisasi & GAP</button>
        </nav>
    </aside>

    <main id="main-content" class="flex-1 p-8 ml-64 transition-all">
        <header class="flex justify-between items-center mb-8 no-print border-b pb-4">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 bg-white border rounded-xl shadow-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
                <h2 id="page-title" class="text-xl font-black text-indigo-950 uppercase tracking-tight">Dashboard Utama</h2>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="window.print()" class="bg-slate-800 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase shadow-sm hover:bg-black transition-all">🖨️ Cetak Laporan</button>
                <span class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-xl font-bold text-[10px] uppercase">TA 2026</span>
            </div>
        </header>

        <section id="section-dashboard" class="tab-content">
            <div class="grid grid-cols-5 gap-6 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-indigo-500"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Rencana RPD</p><h3 id="dash-total-rpd" class="text-xl font-black">Rp 0</h3></div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-orange-500"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Realisasi</p><h3 id="dash-total-real" class="text-xl font-black text-orange-600">Rp 0</h3></div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-red-500"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Deviasi Tertimbang</p><h3 id="dash-total-gap" class="text-xl font-black text-red-600">0.00%</h3></div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-emerald-500"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Status IKPA</p><h3 id="dash-total-sisa" class="text-lg font-black text-emerald-600">-</h3></div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-t-4 border-blue-500"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Nilai IKPA</p><h3 id="dash-total-persen" class="text-xl font-black">0</h3></div>
            </div>
        </section>

        <section id="section-setting-pagu" class="tab-content hidden">
            <div class="input-card">
                <h3 class="text-sm font-black text-indigo-900 uppercase mb-6">Konfigurasi Pagu DIPA (Dinamis)</h3>
                <div class="mb-6">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Periode Triwulan</label>
                    <select id="set-pagu-periode" onchange="updateFormInputPagu()" class="input-field bg-indigo-50 text-indigo-700 font-bold text-lg">
                        <option value="TRIWULAN I">TRIWULAN I</option>
                        <option value="TRIWULAN II">TRIWULAN II</option>
                        <option value="TRIWULAN III">TRIWULAN III</option>
                        <option value="TRIWULAN IV">TRIWULAN IV</option>
                    </select>
                </div>
                <div class="grid grid-cols-3 gap-6 mb-8">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Pagu 51</label><input type="number" id="set-pagu-51" class="input-field font-bold text-lg"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Pagu 52</label><input type="number" id="set-pagu-52" class="input-field font-bold text-lg"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Pagu 53</label><input type="number" id="set-pagu-53" class="input-field font-bold text-lg"></div>
                </div>
                <button onclick="simpanSettingPagu()" class="btn-main bg-indigo-600 hover:bg-indigo-700">Update Pagu Satker</button>
                <div class="mt-10 pt-10 border-t border-slate-100">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-widest text-center">Matriks Pagu Dasar IKPA (Semua TW)</h4>
                    <div class="overflow-hidden rounded-2xl border border-slate-100">
                        <table class="w-full">
                            <thead>
                                <tr>
                                    <th>Jenis Belanja</th>
                                    <th class="bg-blue-50/50">TW I</th>
                                    <th class="bg-emerald-50/50">TW II</th>
                                    <th class="bg-orange-50/50">TW III</th>
                                    <th class="bg-red-50/50">TW IV</th>
                                </tr>
                            </thead>
                            <tbody id="body-info-pagu-all" class="text-center font-bold"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-input-rpd" class="tab-content hidden">
            <div class="input-card">
                <div class="grid grid-cols-5 gap-4 mb-6">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Tim</label><select id="in-tim" class="input-field"><option>Umum</option><option>Sosial</option><option>Produksi</option><option>Distribusi</option><option>Neraca</option><option>IPDS</option></select></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Jenis</label><select id="in-jenis" onchange="filterAkunByJenis(this.value)" class="input-field bg-yellow-50 font-bold"><option value="">Pilih</option><option value="51">51</option><option value="52">52</option><option value="53">53</option></select></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Bulan</label><select id="in-bulan" class="input-field"><option>Januari</option><option>Februari</option><option>Maret</option><option>April</option><option>Mei</option><option>Juni</option><option>Juli</option><option>Agustus</option><option>September</option><option>Oktober</option><option>November</option><option>Desember</option></select></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Uraian</label><input type="text" id="in-uraian" class="input-field"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Anggaran (Rp)</label><input type="number" id="in-anggaran" class="input-field font-bold text-indigo-700"></div>
                </div>
                <button onclick="simpanRPD()" class="btn-main bg-indigo-600 hover:bg-indigo-700">Simpan Rencana RPD</button>
            </div>
            <div class="bg-white rounded-[1.5rem] shadow-sm overflow-hidden border border-slate-100">
                <table class="w-full">
                    <thead><tr><th>Tim</th><th>Jenis</th><th>Uraian</th><th>Anggaran</th><th>Bulan</th><th class="no-print">Aksi</th></tr></thead>
                    <tbody id="body-rpd"></tbody>
                </table>
            </div>
        </section>

        <section id="section-permintaan-belanja" class="tab-content hidden">
            <div class="input-card !border-l-emerald-500">
                <div class="grid grid-cols-4 gap-4 mb-6">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">No. FPB</label><input type="text" id="req-no" class="input-field"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Tgl FPB</label><input type="date" id="req-tgl" class="input-field"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Jenis Permintaan</label><select id="req-type" onchange="toggleSourceRPD(this.value)" class="input-field font-bold"><option value="RPD">RPD</option><option value="Non RPD">Non RPD</option></select></div>
                    <div id="source-rpd-wrap"><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Sumber RPD (Tim | Rp | POK)</label><select id="req-rpd-id" class="input-field"></select></div>
                </div>
                <div class="mb-8">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Uraian Pembayaran</label>
                    <input type="text" id="req-uraian" class="input-field">
                </div>
                <div class="mb-8">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Nilai (Rp)</label>
                    <input type="number" id="req-nilai" class="input-field font-bold text-emerald-600">
                </div>
                <button onclick="simpanPermintaan()" class="btn-main bg-emerald-600 hover:bg-emerald-700">Ajukan Permintaan</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC_PnAtxsdajd0Hltq9X1e0eYcsiASFPxE", authDomain: "proyekkantor-88.firebaseapp.com", projectId: "proyekkantor-88", storageBucket: "proyekkantor-88.firebasestorage.app", messagingSenderId: "381153923700", appId: "1:381153923700:web:4db81ac1a35b42ef4eb721" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let CONFIG_PAGU_ALL = { "TRIWULAN I": { "51": 0, "52": 0, "53": 0 }, "TRIWULAN II": { "51": 0, "52": 0, "53": 0 }, "TRIWULAN III": { "51": 0, "52": 0, "53": 0 }, "TRIWULAN IV": { "51": 0, "52": 0, "53": 0 } };
        let dataRPD = [], dataPerm = [];

        window.simpanSettingPagu = () => {
            const tw = document.getElementById('set-pagu-periode').value;
            CONFIG_PAGU_ALL[tw] = { "51": Number(document.getElementById('set-pagu-51').value) || 0, "52": Number(document.getElementById('set-pagu-52').value) || 0, "53": Number(document.getElementById('set-pagu-53').value) || 0 };
            localStorage.setItem('emba_pagu_all_v4', JSON.stringify(CONFIG_PAGU_ALL));
            renderTablePagu(); alert(`Pagu ${tw} Disimpan!`);
        };

        window.updateFormInputPagu = () => {
            const tw = document.getElementById('set-pagu-periode').value;
            document.getElementById('set-pagu-51').value = CONFIG_PAGU_ALL[tw]["51"] || 0;
            document.getElementById('set-pagu-52').value = CONFIG_PAGU_ALL[tw]["52"] || 0;
            document.getElementById('set-pagu-53').value = CONFIG_PAGU_ALL[tw]["53"] || 0;
        };

        function renderTablePagu() {
            const body = document.getElementById('body-info-pagu-all');
            let html = "";
            ["51", "52", "53"].forEach(jb => {
                html += `<tr><td class="bg-slate-50 font-black text-indigo-600">${jb}</td>`;
                ["TRIWULAN I", "TRIWULAN II", "TRIWULAN III", "TRIWULAN IV"].forEach(tw => {
                    html += `<td>Rp ${CONFIG_PAGU_ALL[tw][jb].toLocaleString()}</td>`;
                });
                html += `</tr>`;
            });
            body.innerHTML = html;
        }

        window.switchTab = (id) => { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.getElementById('section-' + id).classList.remove('hidden'); document.getElementById('page-title').innerText = id.replace('-', ' ').toUpperCase(); };
        window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('hidden-sidebar'); document.getElementById('main-content').classList.toggle('ml-0'); };

        onSnapshot(query(collection(db, "rpd_entries"), orderBy("createdAt", "desc")), (s) => { 
            dataRPD = s.docs.map(d => ({id: d.id, ...d.data()})); 
            const drop = document.getElementById('req-rpd-id');
            if(drop) {
                drop.innerHTML = '<option value="">-- Pilih RPD --</option>';
                dataRPD.forEach(r => { drop.innerHTML += `<option value="${r.id}">${r.tim} | Rp ${r.anggaran.toLocaleString()} | ${r.uraian}</option>`; });
            }
            renderRPD();
        });

        function renderRPD() {
            let h = "";
            dataRPD.forEach(d => { h += `<tr><td>${d.tim}</td><td>${d.jenis}</td><td>${d.uraian}</td><td class="font-bold">Rp ${d.anggaran.toLocaleString()}</td><td>${d.bulan}</td><td class="no-print"><button onclick="deleteDoc(doc(db, 'rpd_entries', '${d.id}'))">🗑️</button></td></tr>`; });
            document.getElementById('body-rpd').innerHTML = h;
        }

        window.simpanRPD = async () => {
            const d = { tim: document.getElementById('in-tim').value, jenis: document.getElementById('in-jenis').value, bulan: document.getElementById('in-bulan').value, uraian: document.getElementById('in-uraian').value, anggaran: Number(document.getElementById('in-anggaran').value), createdAt: serverTimestamp() };
            await addDoc(collection(db, "rpd_entries"), d); alert("Disimpan!");
        };

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('emba_pagu_all_v4');
            if(saved) CONFIG_PAGU_ALL = JSON.parse(saved);
            updateFormInputPagu(); renderTablePagu();
        });
    </script>
</body>
</html>
