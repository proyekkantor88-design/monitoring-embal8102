<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMBAL - BPS Maluku Tenggara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { 
            .no-print, #sidebar, button, select, .input-card { display: none !important; } 
            #main-content { margin-left: 0 !important; padding: 0 !important; width: 100% !important; }
            table { font-size: 7pt !important; width: 100% !important; border-collapse: collapse !important; border: 1px solid black !important; } 
            th, td { border: 1px solid black !important; padding: 4px !important; } 
            @page { size: landscape; margin: 0.5cm; }
        }
        #sidebar { transition: all 0.3s; width: 17rem; }
        #sidebar.hidden-sidebar { margin-left: -17rem; }
        th { font-size: 8px !important; text-transform: uppercase; background-color: #f8fafc; border: 1px solid #e2e8f0; text-align: center; color: #64748b; font-weight: 800; }
        td { font-size: 9px !important; border: 1px solid #e2e8f0; padding: 4px; color: #1e293b; }
        .input-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); padding: 1.5rem; margin-bottom: 2rem; border-left: 8px solid #6366f1; }
        .input-field { width: 100%; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 0.75rem; outline: none; }
        .btn-main { width: 100%; padding: 0.75rem; color: white; font-weight: 800; text-transform: uppercase; border-radius: 0.75rem; cursor: pointer; }
        .status-select { background: #f1f5f9; border: none; font-size: 8px; font-weight: bold; border-radius: 4px; padding: 2px; }
    </style>
</head>
<body class="bg-[#f8fafc] flex font-sans text-slate-900 overflow-x-hidden">

    <div id="login-screen" class="fixed inset-0 bg-[#1e1b4b] z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md text-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/28/Lambang_Badan_Pusat_Statistik_%28BPS%29_Indonesia.svg" class="w-16 h-16 mx-auto mb-4">
            <h1 class="text-2xl font-black text-indigo-950 mb-2 uppercase">Login EMBAL</h1>
            <input type="password" id="login-pass" class="input-field mb-4 text-center text-lg tracking-widest" placeholder="••••••••">
            <button onclick="checkLogin()" class="btn-main bg-indigo-600 hover:bg-indigo-700">Masuk</button>
        </div>
    </div>

    <div id="app-content" class="hidden flex w-full">
        <aside id="sidebar" class="h-screen bg-[#1e1b4b] text-white p-6 fixed top-0 left-0 no-print flex flex-col shadow-2xl z-50">
            <div class="mb-10 border-b border-white/10 pb-6 text-center font-black italic tracking-tighter">
                <h1 class="text-2xl uppercase">EMBAL</h1>
                <p class="text-[8px] text-orange-400 uppercase tracking-widest">BPS Maluku Tenggara</p>
            </div>
            <nav class="flex-1 space-y-2 font-bold text-sm">
                <button onclick="switchTab('dashboard')" class="w-full text-left p-3 rounded-xl hover:bg-white/10">Dashboard Utama</button>
                <button onclick="switchTab('setting-pagu')" class="w-full text-left p-3 rounded-xl hover:bg-white/10 text-orange-300">⚙️ Setting Pagu</button>
                <button onclick="switchTab('input-rpd')" class="w-full text-left p-3 rounded-xl hover:bg-white/10">Input RPD</button>
                <button onclick="switchTab('permintaan-belanja')" class="w-full text-left p-3 rounded-xl hover:bg-white/10">Permintaan Belanja</button>
                <button onclick="switchTab('realisasi-rpd')" class="w-full text-left p-3 rounded-xl hover:bg-white/10 text-emerald-400">Realisasi & GAP</button>
                <button onclick="logout()" class="w-full text-left p-3 rounded-xl hover:bg-red-500/20 text-red-400 mt-10">🚪 Keluar</button>
            </nav>
        </aside>

        <main id="main-content" class="flex-1 p-8 ml-64 transition-all">
            <header class="flex justify-between items-center mb-8 no-print border-b pb-4">
                <h2 id="page-title" class="text-xl font-black text-indigo-950 uppercase">Dashboard Utama</h2>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase">🖨️ Cetak</button>
                    <span class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-xl font-bold text-[10px] uppercase">TA 2026</span>
                </div>
            </header>

            <section id="section-setting-pagu" class="tab-content hidden">
                <div class="input-card">
                    <h3 class="text-sm font-black text-indigo-900 uppercase mb-6">Update Pagu Satker (Data Tersimpan Aman)</h3>
                    <div class="grid grid-cols-4 gap-4 mb-6">
                        <select id="set-pagu-periode" onchange="updateFormInputPagu()" class="input-field bg-indigo-50 font-bold"><option value="TRIWULAN I">TRIWULAN I</option><option value="TRIWULAN II">TRIWULAN II</option><option value="TRIWULAN III">TRIWULAN III</option><option value="TRIWULAN IV">TRIWULAN IV</option></select>
                        <input type="number" id="set-pagu-51" class="input-field" placeholder="Pagu 51">
                        <input type="number" id="set-pagu-52" class="input-field" placeholder="Pagu 52">
                        <input type="number" id="set-pagu-53" class="input-field" placeholder="Pagu 53">
                    </div>
                    <button onclick="simpanSettingPagu()" class="btn-main bg-indigo-600">Simpan Ke Database</button>
                    <div class="mt-8 border-t pt-6">
                        <table class="w-full text-center">
                            <thead><tr><th>Jenis</th><th>TW I</th><th>TW II</th><th>TW III</th><th>TW IV</th></tr></thead>
                            <tbody id="body-info-pagu-all" class="font-bold"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="section-permintaan-belanja" class="tab-content hidden">
                <div class="input-card !border-l-emerald-500">
                    <div class="grid grid-cols-4 gap-4 mb-4">
                        <input type="text" id="req-no" class="input-field" placeholder="No. FPB">
                        <input type="date" id="req-tgl" class="input-field">
                        <select id="req-rpd-id" class="input-field"></select>
                        <input type="number" id="req-nilai" class="input-field" placeholder="Nilai (Rp)">
                    </div>
                    <div class="flex gap-4">
                        <input type="text" id="req-uraian" class="input-field flex-1" placeholder="Uraian Pembayaran...">
                        <button onclick="simpanPermintaan()" class="bg-emerald-600 text-white px-8 rounded-lg font-black uppercase">AJUKAN</button>
                    </div>
                </div>
                <div class="bg-white rounded-[1.5rem] shadow-sm overflow-x-auto border">
                    <table class="w-full text-center min-w-[1200px]">
                        <thead>
                            <tr>
                                <th>No. FPB</th>
                                <th>Tim</th>
                                <th>Nilai</th>
                                <th>Approval</th>
                                <th>Tgl App</th>
                                <th>Proses Bayar</th>
                                <th>Tgl Bayar</th>
                                <th>Status</th>
                                <th class="no-print">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="body-permintaan"></tbody>
                        <tfoot id="foot-permintaan" class="bg-slate-50 font-black"></tfoot>
                    </table>
                </div>
            </section>

            <section id="section-dashboard" class="tab-content"></section>
            <section id="section-input-rpd" class="tab-content hidden"></section>
            <section id="section-realisasi-rpd" class="tab-content hidden"></section>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, serverTimestamp, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC_PnAtxsdajd0Hltq9X1e0eYcsiASFPxE", authDomain: "proyekkantor-88.firebaseapp.com", projectId: "proyekkantor-88", storageBucket: "proyekkantor-88.firebasestorage.app", messagingSenderId: "381153923700", appId: "1:381153923700:web:4db81ac1a35b42ef4eb721" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let CONFIG_PAGU_ALL = { "TRIWULAN I": { "51": 0, "52": 0, "53": 0 }, "TRIWULAN II": { "51": 0, "52": 0, "53": 0 }, "TRIWULAN III": { "51": 0, "52": 0, "53": 0 }, "TRIWULAN IV": { "51": 0, "52": 0, "53": 0 } };
        let dataPerm = [], dataRPD = [];

        // LOGIN
        window.checkLogin = () => { if(document.getElementById('login-pass').value === "bps8102") { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); } };
        window.logout = () => { location.reload(); };

        // 1. DATABASE PAGU (SAVE & LOAD)
        const loadPaguFromDb = () => {
            onSnapshot(doc(db, "config", "setting_pagu"), (snap) => {
                if(snap.exists()) {
                    CONFIG_PAGU_ALL = snap.data().paguData;
                    updateFormInputPagu();
                }
            });
        };

        window.simpanSettingPagu = async () => {
            const tw = document.getElementById('set-pagu-periode').value;
            CONFIG_PAGU_ALL[tw] = {
                "51": Number(document.getElementById('set-pagu-51').value) || 0,
                "52": Number(document.getElementById('set-pagu-52').value) || 0,
                "53": Number(document.getElementById('set-pagu-53').value) || 0
            };
            await setDoc(doc(db, "config", "setting_pagu"), { paguData: CONFIG_PAGU_ALL });
            alert("Pagu Disimpan ke Database!");
        };

        window.updateFormInputPagu = () => {
            const tw = document.getElementById('set-pagu-periode').value;
            const data = CONFIG_PAGU_ALL[tw];
            document.getElementById('set-pagu-51').value = data["51"];
            document.getElementById('set-pagu-52').value = data["52"];
            document.getElementById('set-pagu-53').value = data["53"];
            renderInfoPagu();
        };

        const renderInfoPagu = () => {
            let html = "";
            ["51", "52", "53"].forEach(jb => {
                html += `<tr><td class="bg-slate-50">${jb}</td>`;
                ["TRIWULAN I", "TRIWULAN II", "TRIWULAN III", "TRIWULAN IV"].forEach(tw => {
                    html += `<td>Rp ${CONFIG_PAGU_ALL[tw][jb].toLocaleString()}</td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('body-info-pagu-all').innerHTML = html;
        };

        // 2. PERMINTAAN BELANJA (KOLOM BARU)
        window.simpanPermintaan = async () => {
            const rId = document.getElementById('req-rpd-id').value;
            const selRPD = dataRPD.find(x => x.id === rId);
            const d = {
                noForm: document.getElementById('req-no').value,
                nilai: Number(document.getElementById('req-nilai').value),
                uraian: document.getElementById('req-uraian').value,
                tglFPB: document.getElementById('req-tgl').value,
                tim: selRPD ? selRPD.tim : 'Umum',
                rpdId: rId,
                approval: "-", tglApp: "-",
                prosesBayar: "-", tglBayar: "-",
                statusBayar: "Pending",
                createdAt: serverTimestamp()
            };
            await addDoc(collection(db, "permintaan_belanja"), d);
            alert("Berhasil!");
        };

        window.renderPermintaan = () => {
            let h = "", total = 0;
            dataPerm.forEach(d => {
                total += d.nilai;
                h += `<tr>
                    <td>${d.noForm}</td>
                    <td>${d.tim}</td>
                    <td class="font-bold">Rp ${d.nilai.toLocaleString()}</td>
                    <td>
                        <select onchange="updateProses('${d.id}', 'approval', this.value)" class="status-select">
                            <option ${d.approval==='-'?'selected':''}>-</option>
                            <option ${d.approval==='APP PJ'?'selected':''}>APP PJ</option>
                            <option ${d.approval==='APP PPK'?'selected':''}>APP PPK</option>
                        </select>
                    </td>
                    <td><input type="date" value="${d.tglApp||''}" onchange="updateProses('${d.id}', 'tglApp', this.value)" class="text-[8px] p-0 border"></td>
                    <td>
                        <select onchange="updateProses('${d.id}', 'prosesBayar', this.value)" class="status-select">
                            <option ${d.prosesBayar==='-'?'selected':''}>-</option>
                            <option ${d.prosesBayar==='Pemeriksaan Dokumen'?'selected':''}>Pemeriksaan Dokumen</option>
                            <option ${d.prosesBayar==='Pemeriksaan Bendahara'?'selected':''}>Pemeriksaan Bendahara</option>
                            <option ${d.prosesBayar==='Permintaan KPPN'?'selected':''}>Permintaan KPPN</option>
                            <option ${d.prosesBayar==='Dana Tersedia'?'selected':''}>Dana Tersedia</option>
                            <option ${d.prosesBayar==='Selesai Pembayaran'?'selected':''}>Selesai Pembayaran</option>
                        </select>
                    </td>
                    <td><input type="date" value="${d.tglBayar||''}" onchange="updateProses('${d.id}', 'tglBayar', this.value)" class="text-[8px] p-0 border"></td>
                    <td>
                        <select onchange="updateProses('${d.id}', 'statusBayar', this.value)" class="status-select font-black text-blue-600">
                            <option ${d.statusBayar==='Pending'?'selected':''}>Pending</option>
                            <option ${d.statusBayar==='Kwitansi'?'selected':''}>Kwitansi</option>
                            <option ${d.statusBayar==='SP2D'?'selected':''}>SP2D</option>
                        </select>
                    </td>
                    <td class="no-print"><button onclick="hapusData('${d.id}')">🗑️</button></td>
                </tr>`;
            });
            document.getElementById('body-permintaan').innerHTML = h;
            document.getElementById('foot-permintaan').innerHTML = `<tr><td colspan="2">TOTAL</td><td class="text-green-700">Rp ${total.toLocaleString()}</td><td colspan="6"></td></tr>`;
        };

        window.updateProses = async (id, field, value) => {
            await updateDoc(doc(db, "permintaan_belanja", id), { [field]: value });
        };

        // GLOBAL LISTENERS
        onSnapshot(query(collection(db, "permintaan_belanja"), orderBy("createdAt", "desc")), (s) => {
            dataPerm = s.docs.map(d => ({id: d.id, ...d.data()}));
            window.renderPermintaan();
        });

        onSnapshot(collection(db, "rpd_entries"), (s) => {
            dataRPD = s.docs.map(d => ({id: d.id, ...d.data()}));
            const drop = document.getElementById('req-rpd-id');
            if(drop) {
                drop.innerHTML = '<option value="">-- Pilih RPD --</option>';
                dataRPD.forEach(r => drop.innerHTML += `<option value="${r.id}">${r.tim} | Rp ${r.anggaran.toLocaleString()} | ${r.uraian}</option>`);
            }
        });

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.getElementById('page-title').innerText = id.replace('-', ' ').toUpperCase();
        };

        window.hapusData = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db, "permintaan_belanja", id)); };

        document.addEventListener('DOMContentLoaded', loadPaguFromDb);
    </script>
</body>
</html>
