<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMBAL - BPS Maluku Tenggara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { 
            .no-print { display: none !important; } 
            .main-content { padding: 0 !important; margin-left: 0 !important; }
            table { font-size: 7pt !important; width: 100% !important; border-collapse: collapse !important; }
            th, td { border: 1px solid black !important; padding: 2px !important; }
            @page { size: landscape; margin: 0.5cm; }
            .print-only { display: block !important; text-align: center; margin-bottom: 20px; font-weight: bold; }
        }
        .print-only { display: none; }
        .tab-content { transition: opacity 0.2s; }
        #sidebar { transition: all 0.3s; width: 17rem; }
        #sidebar.hidden-sidebar { margin-left: -17rem; }
        th { font-size: 8px !important; text-transform: uppercase; background-color: #f8fafc; border: 1px solid #e2e8f0; text-align: center; }
        td { font-size: 9px !important; border: 1px solid #e2e8f0; padding: 4px; }
        .foot-total { background-color: #f1f5f9; font-weight: bold; }
        .status-select { font-size: 8.5px; border: 1px solid #cbd5e1; outline: none; border-radius: 4px; padding: 2px; width: 100%; }
        .date-edit { font-size: 8.5px; border: 1px solid #cbd5e1; border-radius: 4px; padding: 1px; width: 95%; }
        .btn-post { background-color: #f59e0b; color: white; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: bold; }
        .btn-unpost { background-color: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: bold; }
        .searchable-input { width: 100%; padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 0.375rem; font-size: 0.75rem; outline: none; background: white; }
    </style>
</head>
<body class="bg-slate-50 flex font-sans text-slate-900 overflow-x-hidden">

    <aside id="sidebar" class="h-screen bg-indigo-950 text-white p-6 fixed top-0 left-0 no-print flex flex-col shadow-2xl z-50">
        <div class="mb-6 border-b border-indigo-800 pb-4">
            <div class="flex items-center gap-2 mb-2">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/28/Lambang_Badan_Pusat_Statistik_%28BPS%29_Indonesia.svg" alt="Logo BPS" class="w-8 h-8">
                <h1 class="text-3xl font-black italic tracking-tighter">EMBAL</h1>
            </div>
            <p class="text-[10px] text-orange-400 font-bold uppercase tracking-widest leading-tight text-left">Evaluasi Monitoring Belanja<br>BPS Kab. Maluku Tenggara</p>
        </div>
        <nav class="flex-1 space-y-2 text-sm font-bold">
            <button onclick="switchTab('dashboard')" class="w-full text-left hover:bg-indigo-900 p-2 rounded-lg">Dashboard Utama</button>
            <button onclick="switchTab('input-rpd')" class="w-full text-left hover:bg-indigo-900 p-2 rounded-lg">Input RPD</button>
            <button onclick="switchTab('permintaan-belanja')" class="w-full text-left hover:bg-indigo-900 p-2 rounded-lg">Permintaan Belanja</button>
            <button onclick="switchTab('realisasi-rpd')" class="w-full text-left hover:bg-indigo-900 p-2 rounded-lg">Realisasi & GAP</button>
        </nav>
    </aside>

 <main id="main-content" class="flex-1 p-8 ml-64 main-container">
        <header class="flex justify-between items-center mb-6 no-print border-b pb-4">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 bg-white border rounded-lg shadow-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
                <h2 id="page-title" class="text-xl font-bold text-indigo-900 uppercase">Dashboard Utama</h2>
            </div>
            <span class="p-1 text-[10px] font-bold bg-indigo-100 text-indigo-700 rounded px-3 uppercase">TA 2026</span>
        </header>

        <section id="section-dashboard" class="tab-content">
            </section>

        <section id="section-input-rpd" class="tab-content hidden">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border-l-4 border-indigo-600 no-print">
                <div class="grid grid-cols-7 gap-2 mb-4">
                    <div><label class="text-[9px] font-bold uppercase">Tim</label><input list="list-tim" id="in-tim" class="searchable-input"><datalist id="list-tim"><option value="Sosial"><option value="Produksi"><option value="Distribusi"><option value="Neraca"><option value="IPDS"><option value="Umum"></datalist></div>
                    <div><label class="text-[9px] font-bold uppercase">Keg.</label><input id="in-kegiatan" class="searchable-input"></div>
                    <div><label class="text-[9px] font-bold uppercase">KRO</label><input id="in-kro" class="searchable-input"></div>
                    <div><label class="text-[9px] font-bold uppercase">RO</label><input id="in-ro" class="searchable-input"></div>
                    <div><label class="text-[9px] font-bold uppercase">Komp</label><input id="in-komp" class="searchable-input"></div>
                    <div><label class="text-[9px] font-bold uppercase">Jenis</label>
                        <select id="in-jenis" class="searchable-input font-bold">
                            <option value="51">51</option>
                            <option value="52">52</option>
                            <option value="53">53</option>
                        </select>
                    </div>
                    <div><label class="text-[9px] font-bold uppercase">Akun</label><input id="in-akun" class="searchable-input"></div>
                </div>
                <div class="grid grid-cols-4 gap-3 mb-4">
                    <div><label class="text-[9px] font-bold uppercase">Bulan</label><select id="in-bulan" class="w-full p-2 border rounded text-xs mt-1"><option>Januari</option><option>Februari</option><option>Maret</option></select></div>
                    <div><label class="text-[9px] font-bold uppercase">Detil POK</label><input type="text" id="in-pok" class="w-full p-2 border rounded text-xs mt-1"></div>
                    <div><label class="text-[9px] font-bold uppercase">Uraian</label><input type="text" id="in-uraian" class="w-full p-2 border rounded text-xs mt-1"></div>
                    <div><label class="text-[9px] font-bold uppercase">Anggaran (Rp)</label><input type="number" id="in-anggaran" class="w-full p-2 border rounded text-xs font-bold mt-1 text-indigo-700"></div>
                </div>
                <button onclick="simpanRPD()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold uppercase shadow-lg">Simpan Rencana RPD</button>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm border p-4 overflow-x-auto">
                <table class="w-full text-center">
                    <thead>
                        <tr>
                            <th>TIM</th>
                            <th>KEG.KRO.RO.KOMP</th>
                            <th>JENIS</th>
                            <th>AKUN</th>
                            <th>DETIL POK</th>
                            <th>URAIAN</th>
                            <th>ANGGARAN</th>
                            <th>BULAN</th>
                            <th class="no-print">AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="body-rpd"></tbody>
                    <tfoot id="foot-rpd" class="foot-total"></tfoot>
                </table>
            </div>
        </section>

        </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC_PnAtxsdajd0Hltq9X1e0eYcsiASFPxE", authDomain: "proyekkantor-88.firebaseapp.com", projectId: "proyekkantor-88", storageBucket: "proyekkantor-88.firebasestorage.app", messagingSenderId: "381153923700", appId: "1:381153923700:web:4db81ac1a35b42ef4eb721" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dataRPD = [], dataPerm = [], editIdRPD = null;
        const bMap = {"01":"Januari", "02":"Februari", "03":"Maret"};

        window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('hidden-sidebar'); document.getElementById('main-content').classList.toggle('ml-64'); };

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            renderAll();
        };

        onSnapshot(query(collection(db, "rpd_entries"), orderBy("createdAt", "desc")), (s) => { dataRPD = s.docs.map(d => ({id: d.id, ...d.data()})); renderAll(); });
        onSnapshot(query(collection(db, "permintaan_belanja"), orderBy("createdAt", "desc")), (s) => { dataPerm = s.docs.map(d => ({id: d.id, ...d.data()})); renderAll(); });

        window.renderAll = () => { renderRPD(); renderDashboard(); renderPermintaan(); renderRealisasi(); };

        // --- RENDER RPD DENGAN KOLOM JENIS ---
        window.renderRPD = () => {
            const body = document.getElementById('body-rpd'), foot = document.getElementById('foot-rpd');
            let html = "", total = 0;
            dataRPD.forEach(d => {
                const kG = `${d.kegiatan || ''}.${d.kro || ''}.${d.ro || ''}.${d.komp || ''}`;
                if (editIdRPD === d.id) {
                    html += `<tr class="bg-indigo-50">
                        <td><input id="e-tim" value="${d.tim}"></td>
                        <td><input id="e-keg" value="${d.kegiatan||''}" class="w-full text-[9px]"></td>
                        <td><select id="e-jen"><option ${d.jenis==='51'?'selected':''}>51</option><option ${d.jenis==='52'?'selected':''}>52</option><option ${d.jenis==='53'?'selected':''}>53</option></select></td>
                        <td><input id="e-aku" value="${d.akun}"></td>
                        <td><input id="e-pok" value="${d.pok||''}"></td>
                        <td><input id="e-ura" value="${d.uraian||''}"></td>
                        <td><input type="number" id="e-ang" value="${d.anggaran}"></td>
                        <td>${d.bulan}</td>
                        <td><button onclick="saveEditRPD('${d.id}')">💾</button></td>
                    </tr>`;
                } else {
                    html += `<tr>
                        <td>${d.tim}</td>
                        <td class="font-mono font-bold text-indigo-900">${kG}</td>
                        <td class="font-bold">${d.jenis || '-'}</td>
                        <td>${d.akun}</td>
                        <td class="text-left">${d.pok || '-'}</td>
                        <td class="text-left">${d.uraian || '-'}</td>
                        <td class="text-right font-bold">Rp ${Number(d.anggaran).toLocaleString()}</td>
                        <td>${d.bulan}</td>
                        <td class="no-print flex gap-1 justify-center"><button onclick="setEditRPD('${d.id}')">✏️</button><button onclick="hapusRPD('${d.id}')">🗑️</button></td>
                    </tr>`;
                }
                total += Number(d.anggaran);
            });
            body.innerHTML = html;
            foot.innerHTML = `<tr><td colspan="6" class="text-right p-2 font-bold uppercase">Total:</td><td class="text-right p-2 font-bold text-indigo-700">Rp ${total.toLocaleString()}</td><td colspan="2"></td></tr>`;
        };

        window.simpanRPD = async () => {
            const d = { 
                tim: document.getElementById('in-tim').value, 
                kegiatan: document.getElementById('in-kegiatan').value,
                kro: document.getElementById('in-kro').value,
                ro: document.getElementById('in-ro').value,
                komp: document.getElementById('in-komp').value,
                jenis: document.getElementById('in-jenis').value, // Simpan Jenis
                akun: document.getElementById('in-akun').value,
                bulan: document.getElementById('in-bulan').value,
                pok: document.getElementById('in-pok').value,
                uraian: document.getElementById('in-uraian').value,
                anggaran: Number(document.getElementById('in-anggaran').value),
                createdAt: serverTimestamp() 
            };
            await addDoc(collection(db, "rpd_entries"), d); alert("Tersimpan!");
        };

        window.setEditRPD = (id) => { editIdRPD = id; renderRPD(); };
        window.saveEditRPD = async (id) => {
            await updateDoc(doc(db, "rpd_entries", id), {
                tim: document.getElementById('e-tim').value,
                jenis: document.getElementById('e-jen').value,
                akun: document.getElementById('e-aku').value,
                anggaran: Number(document.getElementById('e-ang').value)
            });
            editIdRPD = null;
        };
        // Fungsi lainnya (Realisasi, Dashboard, dll) tetap sesuai kode sebelumnya
    </script>
</body>
</html>
