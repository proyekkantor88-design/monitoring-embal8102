<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>EMBAL - BPS Maluku Tenggara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } table { font-size: 7pt !important; width: 100% !important; } th, td { border: 1px solid black !important; padding: 2px !important; } @page { size: landscape; margin: 0.5cm; } }
        #sidebar { width: 16rem; transition: 0.3s; }
        th { font-size: 8px !important; text-transform: uppercase; background: #f8fafc; border: 1px solid #e2e8f0; text-align: center; }
        td { font-size: 9px !important; border: 1px solid #e2e8f0; padding: 4px; }
        .status-select { font-size: 8.5px; border: 1px solid #cbd5e1; border-radius: 4px; padding: 2px; width: 100%; }
        .btn-post { background: #f59e0b; color: white; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: bold; }
        .btn-unpost { background: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 flex font-sans text-slate-900">
    <aside id="sidebar" class="h-screen bg-indigo-950 text-white p-6 fixed no-print flex flex-col shadow-2xl">
        <div class="mb-6 border-b border-indigo-800 pb-4">
            <h1 class="text-3xl font-black italic">EMBAL</h1>
            <p class="text-[10px] text-orange-400 font-bold uppercase">BPS Kab. Maluku Tenggara</p>
        </div>
        <nav class="flex-1 space-y-2 text-sm font-bold">
            <button onclick="switchTab('dashboard')" class="w-full text-left hover:bg-indigo-900 p-2 rounded">Dashboard</button>
            <button onclick="switchTab('input-rpd')" class="w-full text-left hover:bg-indigo-900 p-2 rounded">Input RPD</button>
            <button onclick="switchTab('permintaan-belanja')" class="w-full text-left hover:bg-indigo-900 p-2 rounded">Permintaan</button>
            <button onclick="switchTab('realisasi-rpd')" class="w-full text-left hover:bg-indigo-900 p-2 rounded">Realisasi & GAP</button>
        </nav>
    </aside>
    <main class="flex-1 p-8 ml-64">
        <section id="section-dashboard" class="tab-content">
            <div class="grid grid-cols-4 gap-4 mb-6">
                <div class="bg-white p-4 rounded shadow border-t-4 border-indigo-500">Pagu RPD: <h3 id="dash-total-rpd" class="font-black">0</h3></div>
                <div class="bg-white p-4 rounded shadow border-t-4 border-orange-500">Realisasi: <h3 id="dash-total-real" class="font-black">0</h3></div>
                <div class="bg-white p-4 rounded shadow border-t-4 border-red-500">Total GAP: <h3 id="dash-total-gap" class="font-black text-red-600">0</h3></div>
                <div class="bg-white p-4 rounded shadow border-t-4 border-blue-500">Serapan: <h3 id="dash-total-persen" class="font-black">0%</h3></div>
            </div>
            <table class="w-full bg-white text-center"><thead><tr><th>No FPB</th><th>Tim</th><th>Uraian</th><th>Nilai</th><th>Status</th></tr></thead><tbody id="dash-body-permintaan"></tbody></table>
        </section>
        <section id="section-input-rpd" class="tab-content hidden">
            <div class="bg-white p-6 rounded shadow mb-6 border-l-4 border-indigo-600">
                <div class="grid grid-cols-3 gap-2 mb-2">
                    <input id="in-tim" placeholder="Tim" class="border p-2 text-xs">
                    <input id="in-keg" placeholder="Keg" class="border p-2 text-xs">
                    <input id="in-akun" placeholder="Akun" class="border p-2 text-xs">
                    <select id="in-bulan" class="border p-2 text-xs"><option>Januari</option><option>Februari</option><option>Maret</option></select>
                    <input id="in-pok" placeholder="Uraian RPD/POK" class="border p-2 text-xs">
                    <input id="in-anggaran" type="number" placeholder="Nilai" class="border p-2 text-xs">
                </div>
                <button onclick="simpanRPD()" class="bg-indigo-600 text-white px-4 py-2 rounded text-xs font-bold">SIMPAN PAGU</button>
            </div>
            <table class="w-full bg-white text-center"><thead><tr><th>Tim</th><th>Akun</th><th>Uraian</th><th>Anggaran</th><th>Bulan</th><th>Aksi</th></tr></thead><tbody id="body-rpd"></tbody></table>
        </section>
        <section id="section-permintaan-belanja" class="tab-content hidden">
            <div class="bg-white p-6 rounded shadow mb-6 border-l-4 border-green-600">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input id="req-no" placeholder="No FPB" class="border p-2 text-xs"><input id="req-tgl" type="date" class="border p-2 text-xs">
                    <select id="req-rpd-id" class="border p-2 text-xs font-bold text-indigo-700 w-full col-span-2"></select>
                </div>
                <button onclick="simpanPermintaan()" class="bg-green-600 text-white px-4 py-2 rounded text-xs font-bold">AJUKAN</button>
            </div>
            <table class="w-full bg-white"><thead><tr><th>No FPB</th><th>Uraian</th><th>Nilai</th><th>Approve</th><th>Tgl App</th><th>Status Bayar</th><th>Tgl Bayar</th><th>Aksi</th></tr></thead><tbody id="body-permintaan"></tbody></table>
        </section>
        <section id="section-realisasi-rpd" class="tab-content hidden">
            <div class="bg-white p-6 rounded shadow border-t-4 border-orange-500">
                <select id="f-real-bulan" onchange="renderRealisasi()" class="mb-4 p-1 border rounded text-xs font-bold"><option value="">Semua Bulan (Kumulatif)</option><option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option></select>
                <table class="w-full border text-center"><thead><tr class="bg-slate-50"><th>Tim</th><th>Uraian</th><th>Bulan RPD</th><th>Bulan Bayar</th><th>Rencana</th><th>Realisasi</th><th>GAP</th><th>%</th></tr></thead><tbody id="body-realisasi"></tbody><tfoot id="foot-realisasi" class="bg-slate-100 font-bold"></tfoot></table>
            </div>
        </section>
    </main>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyC_PnAtxsdajd0Hltq9X1e0eYcsiASFPxE", authDomain: "proyekkantor-88.firebaseapp.com", projectId: "proyekkantor-88", storageBucket: "proyekkantor-88.firebasestorage.app", messagingSenderId: "381153923700", appId: "1:381153923700:web:4db81ac1a35b42ef4eb721" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        let dataRPD = [], dataPerm = []; const bMap = {"01":"Januari", "02":"Februari", "03":"Maret"};
        onSnapshot(query(collection(db, "rpd_entries"), orderBy("createdAt", "desc")), (s) => { dataRPD = s.docs.map(d => ({id: d.id, ...d.data()})); renderAll(); });
        onSnapshot(query(collection(db, "permintaan_belanja"), orderBy("createdAt", "desc")), (s) => { dataPerm = s.docs.map(d => ({id: d.id, ...d.data()})); renderAll(); });
        window.switchTab = (id) => { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.getElementById('section-' + id).classList.remove('hidden'); renderAll(); };
        window.renderAll = () => { renderRPD(); renderPermintaan(); renderRealisasi(); renderDashboard(); updateDrop(); };
        window.updateDrop = () => { const drop = document.getElementById('req-rpd-id'); if(!drop) return; const used = dataPerm.map(p => p.rpdId); let opt = '<option value="">-- Pilih Tim - Nilai - POK --</option>'; dataRPD.forEach(d => { if(!used.includes(d.id)) opt += `<option value="${d.id}">${d.tim} - Rp ${d.anggaran.toLocaleString()} - ${d.pok}</option>`; }); drop.innerHTML = opt; };
        window.renderDashboard = () => { let sR = 0, sB = 0, h = ""; dataRPD.forEach(d => sR += Number(d.anggaran)); dataPerm.filter(p => p.isPosted).forEach(p => { sB += Number(p.nilai); h += `<tr><td>${p.noForm}</td><td>${p.tim}</td><td>${p.uraian}</td><td class="text-right">Rp ${p.nilai.toLocaleString()}</td><td class="text-emerald-600 font-bold">POSTED</td></tr>`; }); document.getElementById('dash-total-rpd').innerText = "Rp " + sR.toLocaleString(); document.getElementById('dash-total-real').innerText = "Rp " + sB.toLocaleString(); document.getElementById('dash-total-gap').innerText = "Rp " + (sR-sB).toLocaleString(); document.getElementById('dash-total-persen').innerText = (sR>0?Math.round((sB/sR)*100):0) + "%"; document.getElementById('dash-body-permintaan').innerHTML = h; };
        window.renderRPD = () => { let h = ""; dataRPD.forEach(d => h += `<tr><td>${d.tim}</td><td>${d.kegiatan}</td><td>${d.akun}</td><td>${d.pok}</td><td class="text-right">Rp ${d.anggaran.toLocaleString()}</td><td>${d.bulan}</td><td><button onclick="hapusR('${d.id}')">🗑️</button></td></tr>`); document.getElementById('body-rpd').innerHTML = h; };
        window.renderPermintaan = () => { let h = ""; dataPerm.forEach(d => { const btn = d.isPosted ? `<button onclick="unpost('${d.id}')" class="btn-unpost">BATAL POST ↩️</button>` : `<button onclick="post('${d.id}')" class="btn-post">POST 📮</button>`; h += `<tr><td>${d.noForm}</td><td>${d.uraian}</td><td class="text-right font-bold text-green-700">Rp ${d.nilai.toLocaleString()}</td><td><select onchange="up('${d.id}','approval_status',this.value)" class="status-select"><option ${d.approval_status==='BELUM'?'selected':''}>BELUM</option><option ${d.approval_status==='ACC'?'selected':''}>ACC</option></select></td><td><input type="date" value="${d.tglApp||''}" onchange="vA('${d.id}',this.value)" class="date-edit"></td><td><select onchange="up('${d.id}','status_realisasi',this.value)" class="status-select font-bold"><option>DOKUMEN</option><option>KPPN</option><option ${d.status_realisasi==='Selesai Bayar'?'selected':''}>Selesai Bayar</option></select></td><td><input type="date" value="${d.tglReal||''}" onchange="vP('${d.id}',this.value)" class="date-edit"></td><td class="flex gap-1 justify-center">${btn}<button onclick="hapusP('${d.id}')">🗑️</button></td></tr>`; }); document.getElementById('body-permintaan').innerHTML = h; };
        window.renderRealisasi = () => { const f = document.getElementById('f-real-bulan').value; let h = "", sR = 0, sB = 0; dataRPD.forEach(d => { const p = dataPerm.filter(x => x.rpdId === d.id && x.isPosted); const bI = p.length > 0 ? (p[0].tglReal ? p[0].tglReal.split('-')[1] : '') : ''; let r = 0, b = 0; if(!f) { r = d.anggaran; b = p.reduce((a,c) => a + c.nilai, 0); } else { if(d.bulan === bMap[f]) r = d.anggaran; if(bI === f) b = p.reduce((a,c) => a + c.nilai, 0); if(r===0 && b===0) return; } h += `<tr><td>${d.tim}</td><td>${d.pok}</td><td class="text-indigo-700 font-bold">${d.bulan}</td><td class="text-orange-700 font-bold">${bI?bMap[bI]:'-'}</td><td class="text-right">Rp ${r.toLocaleString()}</td><td class="text-right">Rp ${b.toLocaleString()}</td><td class="text-right font-bold">Rp ${(r-b).toLocaleString()}</td><td class="text-center font-bold">${r>0?Math.round((b/r)*100):0}%</td></tr>`; sR += r; sB += b; }); document.getElementById('body-realisasi').innerHTML = h; document.getElementById('foot-realisasi').innerHTML = `<tr><td colspan="4" class="text-right p-2 uppercase">TOTAL:</td><td class="text-right">Rp ${sR.toLocaleString()}</td><td class="text-right">Rp ${sB.toLocaleString()}</td><td class="text-right text-red-600">Rp ${(sR-sB).toLocaleString()}</td><td></td></tr>`; };
        window.vA = async (id, v) => { const d = dataPerm.find(p => p.id === id); if(d.tglReal && v > d.tglReal) alert("Error: Approve > Bayar!"); else await updateDoc(doc(db, "permintaan_belanja", id), { tglApp: v }); };
        window.vP = async (id, v) => { const d = dataPerm.find(p => p.id === id); if(!d.tglApp || v < d.tglApp) alert("Error: Bayar < Approve!"); else await updateDoc(doc(db, "permintaan_belanja", id), { tglReal: v }); };
        window.up = async (id, f, v) => await updateDoc(doc(db, "permintaan_belanja", id), { [f]: v });
        window.post = async (id) => await updateDoc(doc(db, "permintaan_belanja", id), { isPosted: true });
        window.unpost = async (id) => await updateDoc(doc(db, "permintaan_belanja", id), { isPosted: false });
        window.simpanRPD = async () => { await addDoc(collection(db, "rpd_entries"), { tim: document.getElementById('in-tim').value, kegiatan: document.getElementById('in-keg').value, akun: document.getElementById('in-akun').value, bulan: document.getElementById('in-bulan').value, pok: document.getElementById('in-pok').value, anggaran: Number(document.getElementById('in-anggaran').value), createdAt: serverTimestamp() }); alert("Berhasil"); };
        window.simpanPermintaan = async () => { const id = document.getElementById('req-rpd-id').value, s = dataRPD.find(x => x.id === id); if(!s) return; await addDoc(collection(db, "permintaan_belanja"), { noForm: document.getElementById('req-no').value, tglFPB: document.getElementById('req-tgl').value, rpdId: id, tim: s.tim, uraian: s.pok, nilai: s.anggaran, isPosted: false, createdAt: serverTimestamp() }); alert("Berhasil"); };
        window.hapusR = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db, "rpd_entries", id)); };
        window.hapusP = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db, "permintaan_belanja", id)); };
    </script>
</body>
</html>
